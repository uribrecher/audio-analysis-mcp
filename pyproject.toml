[project]
name = "audio-analysis-mcp"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
  "mcp>=1.0.0",
  "demucs>=4.0.0",
  "librosa>=0.10.0",
  "torch>=2.0",
  "torchaudio>=2.0",
  "torchcodec>=0.1",
  "numpy>=1.24",
  "scipy>=1.10",
  "soundfile>=0.12",
  "sounddevice>=0.4",
  "pydantic>=2.0",
]

[dependency-groups]
dev = [
  "mypy>=1.10",
  "pytest>=8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
markers = ["slow: marks tests as slow (deselect with '-m not slow')"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true

[[tool.mypy.overrides]]
module = [
  "librosa.*",
  "sounddevice.*",
  "soundfile.*",
  "scipy.*",
  "demucs.*",
  "tqdm.*",
]
ignore_missing_imports = true
