name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    env:
      # tone_generation tests load subtractive.schema.json. The canonical
      # source lives in the sibling reverse-synth-research repo (private),
      # so for CI we point the loader at a vendored snapshot under
      # schemas/. See schemas/README.md for the sync process. Locally, the
      # loader defaults to the sibling-repo path, so dev workflow is
      # unchanged.
      TONE_GEN_SCHEMA_DIR: ${{ github.workspace }}/schemas
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"
      # --no-sources ignores [tool.uv.sources] (which redirects songformer
      # to ../SongFormer for local editable dev) and resolves the bare
      # PEP 508 dependencies in pyproject.toml. In CI we want the pinned
      # git URL, not the sibling-path checkout.
      - run: uv sync --dev --no-sources
      - run: uv run mypy src/
      - run: uv run pytest -m "not slow" -v
