# .github/workflows/publish.yml
name: Publish to PyPI
on:
  push:
    tags: ["v*"]      # manual escape hatch: `cz bump` locally then `git push --follow-tags`
  workflow_dispatch:  # release.yml dispatches this (GITHUB_TOKEN-pushed tags don't fire push:tags)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"
      # --no-sources: ignore [tool.uv.sources] (the songformer ../SongFormer editable
      # redirect) — it doesn't exist on a release runner, and a published build must
      # never depend on a local override.
      - run: uv build --no-sources
      - run: uvx twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
